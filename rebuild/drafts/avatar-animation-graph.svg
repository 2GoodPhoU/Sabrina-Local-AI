<svg viewBox="0 0 380 1090" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .header { font-size: 13px; font-weight: 600; fill: #111827; }
    .subheader { font-size: 9px; fill: #6b7280; }
    .panel-title { font-size: 12px; font-weight: 600; fill: #111827; }
    .panel-sub { font-size: 9px; fill: #6b7280; }
    .panel-bg { fill: #fafafa; stroke: #e5e7eb; stroke-width: 1; }

    .state { fill: #ffffff; stroke: #2563eb; stroke-width: 1.5; }
    .state-label { font-size: 10.5px; fill: #111827; text-anchor: middle; font-weight: 500; }
    .edge { stroke: #6b7280; stroke-width: 1; fill: none; }
    .edge-preempt { stroke: #dc2626; stroke-width: 1.25; fill: none; stroke-dasharray: 4 2; }
    .edge-label { font-size: 8px; fill: #4b5563; }
    .edge-label-red { font-size: 8px; fill: #dc2626; font-weight: 600; }

    .emo-node { fill: #ffffff; stroke: #7c3aed; stroke-width: 1.25; }
    .emo-node-center { fill: #faf5ff; stroke: #7c3aed; stroke-width: 1.5; }
    .emo-label { font-size: 9.5px; fill: #111827; text-anchor: middle; font-weight: 500; }
    .emo-edge { stroke: #d1d5db; stroke-width: 0.7; fill: none; }
    .emo-edge-neutral { stroke: #d97706; stroke-width: 1.25; fill: none; stroke-dasharray: 3 2; }
    .cluster-label { font-size: 8.5px; fill: #9ca3af; font-style: italic; }

    .row-label { font-size: 9.5px; fill: #374151; text-anchor: end; font-family: 'Courier New', monospace; }
    .col-label { font-size: 9.5px; fill: #374151; font-family: 'Courier New', monospace; }
    .cell-yes { fill: #10b981; stroke: #ffffff; stroke-width: 1; }
    .cell-no { fill: #f3f4f6; stroke: #ffffff; stroke-width: 1; }

    .legend { font-size: 9px; fill: #4b5563; }
    .legend-bold { font-size: 9px; fill: #4b5563; font-weight: 600; }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Top title -->
  <text x="190" y="20" class="header" text-anchor="middle">Sabrina avatar — animation graph</text>
  <text x="190" y="34" class="subheader" text-anchor="middle">state machine · emotion-space · gesture × mood</text>

  <!-- ========== PANEL 1: State machine ========== -->
  <rect x="8" y="46" width="364" height="280" class="panel-bg" rx="6"/>
  <text x="20" y="63" class="panel-title">1 · App state machine</text>
  <text x="20" y="75" class="panel-sub">Top-level Sabrina states + barge-in preempt edges</text>

  <!-- State boxes -->
  <!-- idle top center -->
  <rect x="145" y="92" width="90" height="26" class="state" rx="5"/>
  <text x="190" y="109" class="state-label">idle</text>

  <!-- listening left-middle -->
  <rect x="20" y="152" width="95" height="26" class="state" rx="5"/>
  <text x="67" y="169" class="state-label">listening</text>

  <!-- thinking center-middle -->
  <rect x="145" y="152" width="90" height="26" class="state" rx="5"/>
  <text x="190" y="169" class="state-label">thinking</text>

  <!-- speaking right-middle -->
  <rect x="265" y="152" width="95" height="26" class="state" rx="5"/>
  <text x="312" y="169" class="state-label">speaking</text>

  <!-- completed bottom center -->
  <rect x="145" y="218" width="90" height="26" class="state" rx="5"/>
  <text x="190" y="235" class="state-label">completed</text>

  <!-- Edges (normal flow) -->
  <!-- idle -> listening (wake) -->
  <path d="M 172 118 Q 130 132 95 152" class="edge" marker-end="url(#arr)"/>
  <text x="100" y="135" class="edge-label">wake</text>
  <!-- listening -> idle (timeout) -->
  <path d="M 95 155 Q 140 130 178 118" class="edge" marker-end="url(#arr)"/>
  <text x="138" y="146" class="edge-label">timeout</text>

  <!-- listening -> thinking (EOS) -->
  <path d="M 115 165 L 143 165" class="edge" marker-end="url(#arr)"/>
  <text x="118" y="160" class="edge-label">EOS</text>

  <!-- thinking -> speaking (first token) -->
  <path d="M 235 165 L 263 165" class="edge" marker-end="url(#arr)"/>
  <text x="238" y="160" class="edge-label">token</text>

  <!-- speaking -> completed (done) -->
  <path d="M 290 178 Q 265 200 235 224" class="edge" marker-end="url(#arr)"/>
  <text x="275" y="208" class="edge-label">done</text>

  <!-- completed -> idle (reset) -->
  <path d="M 152 218 Q 120 170 150 118" class="edge" marker-end="url(#arr)"/>
  <text x="105" y="175" class="edge-label">reset</text>

  <!-- Barge-in edges (red dashed, curving back to listening) -->
  <!-- thinking -> listening -->
  <path d="M 145 175 L 117 175" class="edge-preempt" marker-end="url(#arr-r)"/>
  <!-- speaking -> listening (long curve) -->
  <path d="M 265 172 C 200 192 140 190 117 180" class="edge-preempt" marker-end="url(#arr-r)"/>
  <text x="160" y="205" class="edge-label-red">barge-in</text>

  <!-- Panel 1 legend -->
  <line x1="20" y1="262" x2="42" y2="262" stroke="#6b7280" stroke-width="1" marker-end="url(#arr)"/>
  <text x="50" y="265" class="legend">normal flow</text>
  <line x1="20" y1="278" x2="42" y2="278" class="edge-preempt" marker-end="url(#arr-r)"/>
  <text x="50" y="281" class="legend">barge-in → 200 ms blend to neutral-attentive</text>
  <text x="20" y="298" class="legend">EOS = end-of-speech; token = first assistant token</text>
  <text x="20" y="312" class="legend">Avatar observes StateChanged; brain publishes it.</text>

  <!-- ========== PANEL 2: Emotion cluster graph ========== -->
  <rect x="8" y="336" width="364" height="316" class="panel-bg" rx="6"/>
  <text x="20" y="353" class="panel-title">2 · Emotion-space cluster graph</text>
  <text x="20" y="365" class="panel-sub">8 base presets · dashed = micro-neutral pass (~120 ms)</text>

  <!-- Cluster region labels (faint, italic) -->
  <text x="190" y="395" class="cluster-label" text-anchor="middle">positive</text>
  <text x="50" y="520" class="cluster-label">cognitive</text>
  <text x="190" y="650" class="cluster-label" text-anchor="middle">negative</text>
  <text x="335" y="520" class="cluster-label" text-anchor="end">arousal</text>

  <!-- Emotion edges - draw BEFORE nodes so nodes sit on top -->
  <!-- direct edges (light gray) -->
  <!-- happy <-> amused (same cluster) -->
  <line x1="168" y1="410" x2="212" y2="410" class="emo-edge"/>
  <!-- happy -> neutral -->
  <line x1="160" y1="425" x2="185" y2="505" class="emo-edge"/>
  <!-- amused -> neutral -->
  <line x1="220" y1="425" x2="195" y2="505" class="emo-edge"/>
  <!-- surprised -> neutral -->
  <line x1="295" y1="515" x2="215" y2="530" class="emo-edge"/>
  <!-- surprised -> amused -->
  <line x1="295" y1="500" x2="240" y2="425" class="emo-edge"/>
  <!-- surprised -> happy (across top) -->
  <line x1="290" y1="498" x2="170" y2="415" class="emo-edge"/>
  <!-- thinking -> neutral -->
  <line x1="85" y1="500" x2="165" y2="525" class="emo-edge"/>
  <!-- thinking -> focused (same cluster) -->
  <line x1="70" y1="510" x2="70" y2="555" class="emo-edge"/>
  <!-- focused -> neutral -->
  <line x1="85" y1="565" x2="165" y2="540" class="emo-edge"/>
  <!-- thinking -> happy (cognitive → positive) -->
  <line x1="85" y1="490" x2="140" y2="420" class="emo-edge"/>
  <!-- thinking -> sad (cognitive → negative) -->
  <line x1="85" y1="510" x2="140" y2="600" class="emo-edge"/>
  <!-- focused -> sad -->
  <line x1="85" y1="575" x2="140" y2="610" class="emo-edge"/>
  <!-- focused -> concerned -->
  <line x1="90" y1="570" x2="215" y2="615" class="emo-edge"/>
  <!-- focused -> thinking already drawn -->
  <!-- sad <-> concerned (same cluster) -->
  <line x1="168" y1="615" x2="212" y2="615" class="emo-edge"/>
  <!-- sad -> neutral -->
  <line x1="157" y1="600" x2="183" y2="545" class="emo-edge"/>
  <!-- concerned -> neutral -->
  <line x1="220" y1="600" x2="197" y2="545" class="emo-edge"/>
  <!-- concerned -> surprised -->
  <line x1="238" y1="600" x2="295" y2="520" class="emo-edge"/>

  <!-- Edges that need micro-neutral pass (amber dashed) -->
  <!-- sad → surprised -->
  <line x1="170" y1="608" x2="290" y2="510" class="emo-edge-neutral"/>
  <!-- focused → amused -->
  <line x1="88" y1="560" x2="215" y2="420" class="emo-edge-neutral"/>
  <!-- concerned → happy -->
  <line x1="220" y1="608" x2="170" y2="420" class="emo-edge-neutral"/>

  <!-- Emotion nodes -->
  <!-- neutral (center) -->
  <circle cx="190" cy="525" r="22" class="emo-node-center"/>
  <text x="190" y="528" class="emo-label">neutral</text>

  <!-- positive cluster (top) -->
  <circle cx="150" cy="410" r="20" class="emo-node"/>
  <text x="150" y="413" class="emo-label">happy</text>
  <circle cx="232" cy="410" r="20" class="emo-node"/>
  <text x="232" y="413" class="emo-label">amused</text>

  <!-- surprise (right) -->
  <circle cx="315" cy="500" r="22" class="emo-node"/>
  <text x="315" y="497" class="emo-label">surpri-</text>
  <text x="315" y="508" class="emo-label">sed</text>

  <!-- cognitive (left) -->
  <circle cx="65" cy="495" r="21" class="emo-node"/>
  <text x="65" y="498" class="emo-label">thinking</text>
  <circle cx="65" cy="570" r="21" class="emo-node"/>
  <text x="65" y="573" class="emo-label">focused</text>

  <!-- negative (bottom) -->
  <circle cx="150" cy="615" r="20" class="emo-node"/>
  <text x="150" y="618" class="emo-label">sad</text>
  <circle cx="232" cy="615" r="22" class="emo-node"/>
  <text x="232" y="613" class="emo-label">concer-</text>
  <text x="232" y="623" class="emo-label">ned</text>

  <!-- Panel 2 legend -->
  <line x1="20" y1="640" x2="42" y2="640" class="emo-edge"/>
  <text x="50" y="643" class="legend">direct cross-fade (~200 ms)</text>
  <line x1="200" y1="640" x2="222" y2="640" class="emo-edge-neutral"/>
  <text x="230" y="643" class="legend">via neutral (~120 ms)</text>

  <!-- ========== PANEL 3: Gesture × mood grid ========== -->
  <rect x="8" y="662" width="364" height="420" class="panel-bg" rx="6"/>
  <text x="20" y="679" class="panel-title">3 · Gesture × mood compatibility</text>
  <text x="20" y="691" class="panel-sub">solid cell = allowed · empty = dispatcher drops silently</text>

  <!-- Grid geometry:
       col labels rotated at y ~ 720-755 (top of column strip)
       grid cells start at y = 765, cell size 24
       rows start x = 115 (first cell); cell width 28
       row labels right-anchored at x = 110
  -->

  <!-- Column labels (moods), rotated -50° -->
  <g font-family="'Courier New', monospace">
    <text transform="translate(129, 757) rotate(-50)" class="col-label">neutral</text>
    <text transform="translate(157, 757) rotate(-50)" class="col-label">happy</text>
    <text transform="translate(185, 757) rotate(-50)" class="col-label">sad</text>
    <text transform="translate(213, 757) rotate(-50)" class="col-label">surprised</text>
    <text transform="translate(241, 757) rotate(-50)" class="col-label">thinking</text>
    <text transform="translate(269, 757) rotate(-50)" class="col-label">focused</text>
    <text transform="translate(297, 757) rotate(-50)" class="col-label">concerned</text>
    <text transform="translate(325, 757) rotate(-50)" class="col-label">amused</text>
  </g>

  <!-- Row 0: nod — all Y -->
  <text x="110" y="780" class="row-label">nod</text>
  <rect x="115" y="770" width="26" height="22" class="cell-yes"/>
  <rect x="143" y="770" width="26" height="22" class="cell-yes"/>
  <rect x="171" y="770" width="26" height="22" class="cell-yes"/>
  <rect x="199" y="770" width="26" height="22" class="cell-yes"/>
  <rect x="227" y="770" width="26" height="22" class="cell-yes"/>
  <rect x="255" y="770" width="26" height="22" class="cell-yes"/>
  <rect x="283" y="770" width="26" height="22" class="cell-yes"/>
  <rect x="311" y="770" width="26" height="22" class="cell-yes"/>

  <!-- Row 1: shake — Y N Y Y Y Y Y N -->
  <text x="110" y="808" class="row-label">shake</text>
  <rect x="115" y="798" width="26" height="22" class="cell-yes"/>
  <rect x="143" y="798" width="26" height="22" class="cell-no"/>
  <rect x="171" y="798" width="26" height="22" class="cell-yes"/>
  <rect x="199" y="798" width="26" height="22" class="cell-yes"/>
  <rect x="227" y="798" width="26" height="22" class="cell-yes"/>
  <rect x="255" y="798" width="26" height="22" class="cell-yes"/>
  <rect x="283" y="798" width="26" height="22" class="cell-yes"/>
  <rect x="311" y="798" width="26" height="22" class="cell-no"/>

  <!-- Row 2: tilt_left — all Y -->
  <text x="110" y="836" class="row-label">tilt_left</text>
  <rect x="115" y="826" width="26" height="22" class="cell-yes"/>
  <rect x="143" y="826" width="26" height="22" class="cell-yes"/>
  <rect x="171" y="826" width="26" height="22" class="cell-yes"/>
  <rect x="199" y="826" width="26" height="22" class="cell-yes"/>
  <rect x="227" y="826" width="26" height="22" class="cell-yes"/>
  <rect x="255" y="826" width="26" height="22" class="cell-yes"/>
  <rect x="283" y="826" width="26" height="22" class="cell-yes"/>
  <rect x="311" y="826" width="26" height="22" class="cell-yes"/>

  <!-- Row 3: tilt_right — all Y -->
  <text x="110" y="864" class="row-label">tilt_right</text>
  <rect x="115" y="854" width="26" height="22" class="cell-yes"/>
  <rect x="143" y="854" width="26" height="22" class="cell-yes"/>
  <rect x="171" y="854" width="26" height="22" class="cell-yes"/>
  <rect x="199" y="854" width="26" height="22" class="cell-yes"/>
  <rect x="227" y="854" width="26" height="22" class="cell-yes"/>
  <rect x="255" y="854" width="26" height="22" class="cell-yes"/>
  <rect x="283" y="854" width="26" height="22" class="cell-yes"/>
  <rect x="311" y="854" width="26" height="22" class="cell-yes"/>

  <!-- Row 4: blink_long — all Y -->
  <text x="110" y="892" class="row-label">blink_long</text>
  <rect x="115" y="882" width="26" height="22" class="cell-yes"/>
  <rect x="143" y="882" width="26" height="22" class="cell-yes"/>
  <rect x="171" y="882" width="26" height="22" class="cell-yes"/>
  <rect x="199" y="882" width="26" height="22" class="cell-yes"/>
  <rect x="227" y="882" width="26" height="22" class="cell-yes"/>
  <rect x="255" y="882" width="26" height="22" class="cell-yes"/>
  <rect x="283" y="882" width="26" height="22" class="cell-yes"/>
  <rect x="311" y="882" width="26" height="22" class="cell-yes"/>

  <!-- Row 5: eye_roll — Y N N N N N Y Y -->
  <text x="110" y="920" class="row-label">eye_roll</text>
  <rect x="115" y="910" width="26" height="22" class="cell-yes"/>
  <rect x="143" y="910" width="26" height="22" class="cell-no"/>
  <rect x="171" y="910" width="26" height="22" class="cell-no"/>
  <rect x="199" y="910" width="26" height="22" class="cell-no"/>
  <rect x="227" y="910" width="26" height="22" class="cell-no"/>
  <rect x="255" y="910" width="26" height="22" class="cell-no"/>
  <rect x="283" y="910" width="26" height="22" class="cell-yes"/>
  <rect x="311" y="910" width="26" height="22" class="cell-yes"/>

  <!-- Row 6: wink — N Y N N N N N Y -->
  <text x="110" y="948" class="row-label">wink</text>
  <rect x="115" y="938" width="26" height="22" class="cell-no"/>
  <rect x="143" y="938" width="26" height="22" class="cell-yes"/>
  <rect x="171" y="938" width="26" height="22" class="cell-no"/>
  <rect x="199" y="938" width="26" height="22" class="cell-no"/>
  <rect x="227" y="938" width="26" height="22" class="cell-no"/>
  <rect x="255" y="938" width="26" height="22" class="cell-no"/>
  <rect x="283" y="938" width="26" height="22" class="cell-no"/>
  <rect x="311" y="938" width="26" height="22" class="cell-yes"/>

  <!-- Row 7: shrug — Y Y Y N Y N Y Y -->
  <text x="110" y="976" class="row-label">shrug</text>
  <rect x="115" y="966" width="26" height="22" class="cell-yes"/>
  <rect x="143" y="966" width="26" height="22" class="cell-yes"/>
  <rect x="171" y="966" width="26" height="22" class="cell-yes"/>
  <rect x="199" y="966" width="26" height="22" class="cell-no"/>
  <rect x="227" y="966" width="26" height="22" class="cell-yes"/>
  <rect x="255" y="966" width="26" height="22" class="cell-no"/>
  <rect x="283" y="966" width="26" height="22" class="cell-yes"/>
  <rect x="311" y="966" width="26" height="22" class="cell-yes"/>

  <!-- Panel 3 legend -->
  <rect x="20" y="1008" width="14" height="12" class="cell-yes"/>
  <text x="40" y="1018" class="legend">allowed</text>
  <rect x="100" y="1008" width="14" height="12" class="cell-no"/>
  <text x="120" y="1018" class="legend">disallowed (drop)</text>
  <text x="20" y="1040" class="legend">Priority on shared parameters (high → low):</text>
  <text x="20" y="1054" class="legend">mouth: speech &gt; gesture &gt; mood &gt; ambient</text>
  <text x="20" y="1067" class="legend">head / body / eyes: gesture &gt; (gaze cue &gt;) mood &gt; ambient</text>
</svg>
